providers = ["python", "node"]

[phases.setup]
nixPkgs = ["python313", "nodejs_22"]

[phases.install]
cmds = [
  "python3 -m pip install -r requirements.txt",
  "cd frontend && npm install"
]

[phases.build]
cmds = [
  "cd frontend && npm run build"
]

[start]
cmd = "uvicorn app:app --host 0.0.0.0 --port $PORT"
